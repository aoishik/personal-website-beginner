name: Mirror Website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove Source Custom Domain
        run: |
          rm -f CNAME

      - name: Push to Destination Repository
        run: |
          git init
          git add -A
          git commit -m "Mirror website" || true

          git branch -M main

          git remote add destination https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/aoishik/aoishik.github.io.git

          git push --force destination main
