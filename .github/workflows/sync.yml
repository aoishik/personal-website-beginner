name: Mirror Website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Remove CNAME
        run: rm -f CNAME

      - name: Commit changes
        run: |
          git add -A
          git commit -m "Mirror website (without CNAME)" || true

      - name: Push to GitHub Pages repository
        env:
          PAT: ${{ secrets.SYNC_PAT }}
        run: |
          git remote remove destination 2>/dev/null || true
          git remote add destination https://x-access-token:${PAT}@github.com/aoishik/aoishik.github.io.git
          git push --force destination HEAD:main
