name: Sync to Repo B without CNAME

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is master

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Repo B cleanly
        run: |
          # 1. Set Git Identity and fix ownership warning
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /github/workspace
          
          # 2. Delete Repo A's custom domain CNAME file in the runner workspace
          rm -f CNAME
          
          # 3. Local commit so Git logs the removal
          git add CNAME || true
          git commit -m "Strip Repo A CNAME for Repo B sync" || true

          # 4. Push directly to Repo B using the token for authentication
          git push -f https://x-access-token:${{ secrets.SYNC_PAT }}@://github.com/aoishik/aoishik.github.io main
